<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sync Notes - Settings</title>
    <link rel="stylesheet" href="settings.css">
</head>
<body>
    <div class="app-layout">

        <!-- ===== Desktop Sidebar (web only) ===== -->
        <!-- React: <Sidebar /> -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar__header">
                <div class="sidebar__brand">
                    <h1 class="sidebar__logo">Sync Notes</h1>
                </div>
                <button class="sidebar__toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
                    <svg class="sidebar__toggle-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="11 17 6 12 11 7"/>
                        <polyline points="18 17 13 12 18 7"/>
                    </svg>
                </button>
            </div>

            <nav class="sidebar__nav">
                <a href="../home/home.html" class="sidebar__link" data-tab="home">
                    <svg class="sidebar__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                    <span class="sidebar__label">Home</span>
                </a>
                <a href="#settings" class="sidebar__link sidebar__link--active" data-tab="settings">
                    <svg class="sidebar__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                    <span class="sidebar__label">Settings</span>
                </a>
            </nav>
        </aside>

        <!-- ===== Main Content ===== -->
        <!-- React: <SettingsPage /> -->
        <main class="main-content">

            <!-- ==================================================
                 VIEW: Settings Main
                 React: <SettingsMain />
                 ================================================== -->
            <section class="settings-view settings-view--active" id="view-settings" data-view="settings">

                <header class="view-header">
                    <h2 class="view-header__title">Settings</h2>
                </header>

                <!-- User Card -->
                <!-- React: <UserCard /> -->
                <div class="user-card">
                    <div class="user-card__avatar" id="user-avatar">
                        <img src="https://i.pravatar.cc/80?img=12" alt="Alex Johnson" class="user-card__img"/>
                    </div>
                    <div class="user-card__info">
                        <h3 class="user-card__name">Alex Johnson</h3>
                        <p class="user-card__email">alexjohnson@gmail.com</p>
                    </div>
                </div>

                <!-- Menu Items -->
                <!-- React: <SettingsMenu /> -->
                <ul class="settings-menu" role="list">
                    <li class="settings-menu__item" data-navigate="profile" role="button" tabindex="0">
                        <div class="settings-menu__text">
                            <span class="settings-menu__label">Profile</span>
                            <span class="settings-menu__desc">Avatar, Username, Email ID</span>
                        </div>
                        <svg class="settings-menu__arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6"/>
                        </svg>
                    </li>
                    <li class="settings-menu__item" data-navigate="appearance" role="button" tabindex="0">
                        <div class="settings-menu__text">
                            <span class="settings-menu__label">Appearance</span>
                            <span class="settings-menu__desc">Theme, Font</span>
                        </div>
                        <svg class="settings-menu__arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6"/>
                        </svg>
                    </li>
                </ul>

                <!-- Log Out -->
                <!-- React: <LogOutButton /> -->
                <button class="logout-btn" id="logout-btn">
                    <svg class="logout-btn__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    <span>Log Out</span>
                </button>

            </section>

            <!-- ==================================================
                 VIEW: Profile
                 React: <ProfileView />
                 ================================================== -->
            <section class="settings-view" id="view-profile" data-view="profile">

                <header class="view-header view-header--back">
                    <button class="view-header__back" data-back aria-label="Back to settings">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="19" y1="12" x2="5" y2="12"/>
                            <polyline points="12 19 5 12 12 5"/>
                        </svg>
                    </button>
                    <h2 class="view-header__title">Profile</h2>
                </header>

                <!-- Profile Picture Row -->
                <!-- React: <ProfilePicture /> -->
                <div class="profile-row">
                    <span class="profile-row__label">Profile Picture</span>
                    <div class="profile-avatar">
                        <span class="profile-avatar__circle" id="profile-initials">DR</span>
                        <button class="profile-avatar__edit" aria-label="Change profile picture">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="divider"></div>

                <!-- Username Row -->
                <!-- React: <UsernameField /> -->
                <div class="profile-row">
                    <span class="profile-row__label">Username</span>
                    <div class="profile-row__value">
                        <input type="text" class="profile-input" id="username-input" value="Dhilip" aria-label="Username"/>
                    </div>
                </div>

                <div class="divider"></div>

                <!-- Change Password Row -->
                <!-- React: <ChangePasswordLink /> -->
                <div class="profile-row profile-row--clickable" id="open-password-modal" role="button" tabindex="0">
                    <span class="profile-row__label">Change password</span>
                    <svg class="profile-row__arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"/>
                    </svg>
                </div>

            </section>

            <!-- ==================================================
                 VIEW: Appearance
                 React: <AppearanceView />
                 ================================================== -->
            <section class="settings-view" id="view-appearance" data-view="appearance">

                <header class="view-header view-header--back">
                    <button class="view-header__back" data-back aria-label="Back to settings">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="19" y1="12" x2="5" y2="12"/>
                            <polyline points="12 19 5 12 12 5"/>
                        </svg>
                    </button>
                    <h2 class="view-header__title">Appearance</h2>
                </header>

                <!-- Theme -->
                <!-- React: <ThemeSelector /> -->
                <div class="appearance-row">
                    <span class="appearance-row__label">Theme</span>
                    <select class="appearance-select" id="theme-select" aria-label="Select theme">
                        <option value="light" selected>Light</option>
                        <option value="dark">Dark</option>
                        <option value="system">System</option>
                    </select>
                </div>

                <div class="divider"></div>

                <!-- Font Size -->
                <!-- React: <FontSelector /> -->
                <div class="appearance-row">
                    <span class="appearance-row__label">Font</span>
                    <select class="appearance-select" id="font-select" aria-label="Select font size">
                        <option value="small" selected>Small</option>
                        <option value="medium">Medium</option>
                        <option value="large">Large</option>
                    </select>
                </div>

            </section>

        </main>

        <!-- ==================================================
             MODAL: Change Password
             React: <ChangePasswordModal />
             ================================================== -->
        <div class="modal-overlay" id="password-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <div class="modal-sheet">

                <h3 class="modal-sheet__title" id="modal-title">Change password</h3>

                <!-- React: <ChangePasswordForm /> -->
                <form class="password-form" id="password-form" novalidate>
                    <div class="password-form__row">
                        <label class="password-form__label" for="pw-email">Email ID</label>
                        <span class="password-form__static" id="pw-email">alexjohnson@gmail.com</span>
                    </div>

                    <div class="password-form__row">
                        <label class="password-form__label" for="pw-current">Current password</label>
                        <input type="password" class="password-form__input" id="pw-current" placeholder="Enter password" autocomplete="current-password"/>
                    </div>

                    <div class="password-form__row">
                        <label class="password-form__label" for="pw-new">Create new password</label>
                        <input type="password" class="password-form__input" id="pw-new" placeholder="Enter password" autocomplete="new-password"/>
                    </div>

                    <div class="password-form__row">
                        <label class="password-form__label" for="pw-confirm">Confirm password</label>
                        <input type="password" class="password-form__input" id="pw-confirm" placeholder="Enter password" autocomplete="new-password"/>
                    </div>

                    <div class="password-form__actions">
                        <button type="button" class="password-form__btn password-form__btn--cancel" id="modal-cancel">Cancel</button>
                        <button type="submit" class="password-form__btn password-form__btn--submit">Create</button>
                    </div>
                </form>

            </div>
        </div>

        <!-- ===== Mobile Bottom Nav ===== -->
        <!-- React: <BottomNav /> -->
        <nav class="bottom-nav" id="bottom-nav">
            <a href="../home/home.html" class="bottom-nav__item" data-tab="home">
                <svg class="bottom-nav__icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                <span class="bottom-nav__label">Home</span>
            </a>
            <a href="#settings" class="bottom-nav__item bottom-nav__item--active" data-tab="settings">
                <svg class="bottom-nav__icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
                <span class="bottom-nav__label">Settings</span>
            </a>
        </nav>

    </div>

    <script src="settings.js"></script>
</body>
</html>

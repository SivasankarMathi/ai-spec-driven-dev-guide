<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication - Note Taking App</title>
    <link rel="stylesheet" href="../theme.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <!-- Theme Toggle FAB -->
    <button class="theme-toggle-fab" aria-label="Toggle dark mode">
        <svg class="theme-toggle-icon sun" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="theme-toggle-icon moon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
    </button>

    <!-- Sign Up Form -->
    <div class="auth-container" id="signup-container">
        <div class="auth-card">
            <h1 class="auth-card__title">Create A New Account</h1>
            
            <form class="auth-form" id="signup-form">
                <div class="form-group">
                    <label for="signup-name" class="form-group__label">Name</label>
                    <input 
                        type="text" 
                        id="signup-name" 
                        className="form-group__input"
                        class="form-group__input"
                        placeholder="Enter name"
                        required
                    />
                </div>

                <div class="form-group">
                    <label for="signup-email" class="form-group__label">E-mail</label>
                    <input 
                        type="email" 
                        id="signup-email" 
                        className="form-group__input"
                        class="form-group__input"
                        placeholder="Enter your email"
                        required
                    />
                </div>

                <div class="form-group">
                    <label for="signup-password" class="form-group__label">Create Password</label>
                    <div class="form-group__input-wrapper">
                        <input 
                            type="password" 
                            id="signup-password" 
                            className="form-group__input form-group__input--password"
                            class="form-group__input form-group__input--password"
                            placeholder="Enter password"
                            required
                        />
                        <button 
                            type="button" 
                            className="password-toggle"
                            class="password-toggle"
                            data-target="signup-password"
                            aria-label="Toggle password visibility"
                        >
                            <svg className="password-toggle__icon" class="password-toggle__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="signup-confirm-password" class="form-group__label">Confirm Password</label>
                    <div class="form-group__input-wrapper">
                        <input 
                            type="password" 
                            id="signup-confirm-password" 
                            className="form-group__input form-group__input--password"
                            class="form-group__input form-group__input--password"
                            placeholder="Enter password"
                            required
                        />
                        <button 
                            type="button" 
                            className="password-toggle"
                            class="password-toggle"
                            data-target="signup-confirm-password"
                            aria-label="Toggle password visibility"
                        >
                            <svg className="password-toggle__icon" class="password-toggle__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" className="btn btn--primary" class="btn btn--primary">
                    Sign up
                </button>
            </form>

            <p class="auth-card__footer">
                Already have an account? 
                <a href="#signin" className="link" class="link" data-navigate="signin">Sign in</a>
            </p>
        </div>
    </div>

    <!-- Sign In Form -->
    <div class="auth-container" id="signin-container" style="display: none;">
        <div class="auth-card">
            <h1 class="auth-card__title">Sign In To Your Account</h1>
            
            <form class="auth-form" id="signin-form">
                <div class="form-group">
                    <label for="signin-email" class="form-group__label">E-mail</label>
                    <input 
                        type="email" 
                        id="signin-email" 
                        className="form-group__input"
                        class="form-group__input"
                        placeholder="Enter your email"
                        required
                    />
                </div>

                <div class="form-group">
                    <label for="signin-password" class="form-group__label">Password</label>
                    <div class="form-group__input-wrapper">
                        <input 
                            type="password" 
                            id="signin-password" 
                            className="form-group__input form-group__input--password"
                            class="form-group__input form-group__input--password"
                            placeholder="Enter password"
                            required
                        />
                        <button 
                            type="button" 
                            className="password-toggle"
                            class="password-toggle"
                            data-target="signin-password"
                            aria-label="Toggle password visibility"
                        >
                            <svg className="password-toggle__icon" class="password-toggle__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                    <a href="#forgot-password" className="form-group__link" class="form-group__link">Forgot password?</a>
                </div>

                <button type="submit" className="btn btn--primary" class="btn btn--primary">
                    Sign in
                </button>
            </form>

            <p class="auth-card__footer">
                Don't have an account yet? 
                <a href="#signup" className="link" class="link" data-navigate="signup">Sign up</a>
            </p>

            <div class="divider">
                <span class="divider__text">Or</span>
            </div>

            <div class="oauth-buttons">
                <button type="button" className="btn btn--oauth" class="btn btn--oauth" data-provider="google">
                    <svg className="btn--oauth__icon" class="btn--oauth__icon" width="18" height="18" viewBox="0 0 18 18">
                        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
                        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
                        <path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707 0-.593.102-1.17.282-1.709V4.958H.957C.347 6.173 0 7.548 0 9c0 1.452.348 2.827.957 4.042l3.007-2.335z"/>
                        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
                    </svg>
                    Sign in with Google
                </button>

                <button type="button" className="btn btn--oauth" class="btn btn--oauth" data-provider="microsoft">
                    <svg className="btn--oauth__icon" class="btn--oauth__icon" width="18" height="18" viewBox="0 0 21 21">
                        <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
                        <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
                        <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
                        <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
                    </svg>
                    Sign in with Microsoft
                </button>
            </div>
        </div>
    </div>

    <script src="../theme.js"></script>
    <script src="auth.js"></script>
</body>
</html>
